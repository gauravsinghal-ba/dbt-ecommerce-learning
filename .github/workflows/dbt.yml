name: dbt CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 1 * * *'    # runs every day at 1am UTC (6:30am IST)

jobs:
  dbt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install "dbt-core==1.9.5" "dbt-postgres==1.9.1"

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          dbt_ecommerce:
            target: dev
            outputs:
              dev:
                type: postgres
                host: ${{ secrets.DBT_HOST }}
                port: 5432
                user: ${{ secrets.DBT_USER }}
                password: ${{ secrets.DBT_PASSWORD }}
                dbname: ${{ secrets.DBT_DBNAME }}
                schema: dbt_dev
                threads: 4
                sslmode: require
          EOF

      - name: Run daily models
        run: dbt run --select tag:daily

      - name: Test daily models
        run: dbt test --select tag:daily
